name: Deploy

on:
  repository_dispatch:
    types: [GitRepository/slimevr-server]
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific version to build (e.g., 0.18.2). Leave empty to auto-discover.'
        required: false
        type: string
      include-prereleases:
        description: 'Include prerelease versions (e.g., 0.16.3-rc.1)'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  SLIMEVR_REPO: SlimeVR/SlimeVR-Server
  MIN_VERSION: '0.13.0'

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.diff.outputs.versions }}
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch deployed versions from S3
        env:
          S3_BUCKET: ${{ vars.TF_VAR_S3_BUCKET_NAME }}
        run: |
          if aws s3 cp "s3://$S3_BUCKET/versions.json" versions.json 2>/dev/null; then
            echo "Found existing versions.json"
            cat versions.json
          else
            echo "No versions.json found, starting fresh"
            echo '[]' > versions.json
          fi

      - name: Fetch upstream releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ env.SLIMEVR_REPO }}/releases --paginate --jq '.[].tag_name' | \
            sed 's/^v//' | sort -V > all_releases.txt
          echo "All releases:"
          cat all_releases.txt

      - name: Discover versions to build
        id: diff
        run: |
          bun scripts/ci-discover-versions.ts \
            --deployed versions.json \
            --releases all_releases.txt \
            --min-version "${{ env.MIN_VERSION }}" \
            ${{ inputs.version && format('--override {0}', inputs.version) || '' }} \
            ${{ inputs.include-prereleases && '--include-prereleases' || '' }}

  # Generate schema fingerprints from git history (parallel with builds).
  fingerprints:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v6

      # Clone both repos with full history. Can't use actions/checkout for
      # submodules because it creates shallow clones that miss historical
      # commits needed by explore-protocol.ts for git-archive.
      - name: Clone SlimeVR-Server
        run: |
          git clone https://github.com/${{ env.SLIMEVR_REPO }}.git SlimeVR-Server
          git clone https://github.com/SlimeVR/SolarXR-Protocol.git SlimeVR-Server/solarxr-protocol

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install flatbuffers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo google/flatbuffers --pattern 'Linux.flatc.binary.clang++*.zip' --dir /tmp/flatc
          unzip -o /tmp/flatc/*.zip -d /usr/local/bin
          chmod +x /usr/local/bin/flatc
          flatc --version

      - name: Generate fingerprints
        run: |
          bun scripts/explore-protocol.ts \
            --server-repo SlimeVR-Server \
            --output protocol-exploration.json

          bun scripts/extract-schema-fingerprints.ts \
            --input protocol-exploration.json \
            --output schema-fingerprints.json

      - name: Upload fingerprints
        uses: actions/upload-artifact@v4
        with:
          name: schema-fingerprints
          path: schema-fingerprints.json
          retention-days: 1

  # Build each version in parallel. Only builds the GUI — no server, no tests.
  # Uploads the dist as an artifact for the test + deploy jobs.
  build:
    needs: discover
    if: needs.discover.outputs.versions != '[]' && needs.discover.outputs.versions != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.discover.outputs.versions) }}
    continue-on-error: true
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v6
        with:
          path: deploy-repo

      - name: Checkout SlimeVR-Server at v${{ matrix.version }}
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SLIMEVR_REPO }}
          ref: v${{ matrix.version }}
          submodules: recursive
          path: SlimeVR-Server

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install deployment repo deps
        working-directory: deploy-repo
        run: bun install

      - name: Patch source for deployment
        working-directory: deploy-repo
        run: bun scripts/patch-for-deploy.ts --gui-root ../SlimeVR-Server/gui --base-path "/${{ matrix.version }}/"

      - name: Install dependencies
        working-directory: SlimeVR-Server
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build solarxr-protocol
        working-directory: SlimeVR-Server
        run: pnpm run update-solarxr

      - name: Build GUI
        working-directory: SlimeVR-Server/gui
        env:
          BASE_PATH: /${{ matrix.version }}/
        run: |
          if [ -f electron.vite.config.ts ]; then
            npx vite build
          else
            pnpm run build
          fi

      - name: Verify paths
        working-directory: deploy-repo
        run: bun scripts/verify-paths.ts ../SlimeVR-Server/gui/dist "/${{ matrix.version }}/"

      - name: Upload GUI dist
        uses: actions/upload-artifact@v4
        with:
          name: gui-dist-${{ matrix.version }}
          path: SlimeVR-Server/gui/dist
          retention-days: 1

  # Run smoke tests against all built versions at once.
  test:
    needs: [discover, build, fingerprints]
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.tested.outputs.versions }}
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install && bunx playwright install --with-deps chromium

      - name: Download all GUI dists
        uses: actions/download-artifact@v4
        with:
          pattern: gui-dist-*
          path: serve-root

      - name: Download fingerprints
        uses: actions/download-artifact@v4
        with:
          name: schema-fingerprints
          path: serve-root

      - name: Assemble serve-root
        run: |
          # download-artifact creates gui-dist-{version}/ subdirs; rename to {version}/
          cd serve-root
          for dir in gui-dist-*; do
            version="${dir#gui-dist-}"
            mv "$dir" "$version"
          done
          echo "Assembled versions:"
          ls -1

      - name: Run smoke tests
        id: tested
        run: |
          bun scripts/serve.ts --dir serve-root --port 8765 &
          SERVE_PID=$!
          timeout 10 bash -c 'until curl -sf http://localhost:8765/ > /dev/null 2>&1; do sleep 1; done' || true

          passed=()
          failed=()
          for version in $(ls serve-root | grep -v schema-fingerprints); do
            echo "--- Testing $version ---"
            if TEST_VERSION="$version" SERVE_PORT=8765 bunx playwright test 2>&1; then
              passed+=("$version")
            else
              failed+=("$version")
              echo "FAILED: $version"
            fi
          done

          kill $SERVE_PID 2>/dev/null || true

          echo "Passed: ${passed[*]}"
          echo "Failed: ${failed[*]}"

          # Output as JSON array
          versions=$(printf '%s\n' "${passed[@]}" | jq -R . | jq -sc .)
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  # Deploy tested versions to S3 and update the index page.
  deploy:
    needs: [discover, test, fingerprints]
    if: always() && needs.test.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # --- Upload tested GUI dists to S3 ---
      - name: Download tested GUI dists
        uses: actions/download-artifact@v4
        with:
          pattern: gui-dist-*
          path: gui-dists

      - name: Upload to S3
        env:
          S3_BUCKET: ${{ vars.TF_VAR_S3_BUCKET_NAME }}
        run: |
          succeeded='${{ needs.test.outputs.versions }}'
          for version in $(echo "$succeeded" | jq -r '.[]'); do
            dist="gui-dists/gui-dist-${version}"
            [ -d "$dist" ] || continue

            aws s3 sync "$dist/assets/" "s3://$S3_BUCKET/$version/assets/" \
              --cache-control "public, max-age=31536000, immutable"

            aws s3 sync "$dist/" "s3://$S3_BUCKET/$version/" \
              --exclude "assets/*" \
              --cache-control "public, max-age=86400"

            echo "Uploaded $version"
          done

      # --- Update versions.json (once, no race) ---
      - name: Update versions.json
        env:
          S3_BUCKET: ${{ vars.TF_VAR_S3_BUCKET_NAME }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if aws s3 cp "s3://$S3_BUCKET/versions.json" versions.json 2>/dev/null; then
            echo "Fetched existing versions.json"
          else
            echo '[]' > versions.json
          fi

          attempted='${{ needs.discover.outputs.versions }}'
          succeeded='${{ needs.test.outputs.versions }}'

          # Record successful builds
          for version in $(echo "$succeeded" | jq -r '.[]'); do
            release=$(gh api "repos/${{ env.SLIMEVR_REPO }}/releases/tags/v${version}" 2>/dev/null || echo '{}')
            url=$(echo "$release" | jq -r '.html_url // empty')
            date=$(echo "$release" | jq -r '.published_at // empty')

            bun scripts/ci-update-versions-json.ts versions.json "$version" \
              --status ok \
              ${url:+--release-url "$url"} \
              ${date:+--date "$date"}
          done

          # Record failed builds (attempted minus succeeded)
          for version in $(echo "$attempted" | jq -r '.[]'); do
            if ! echo "$succeeded" | jq -e --arg v "$version" 'index($v) != null' > /dev/null 2>&1; then
              bun scripts/ci-update-versions-json.ts versions.json "$version" \
                --status failed --fail-reason "build or smoke test failed"
            fi
          done

          aws s3 cp versions.json "s3://$S3_BUCKET/versions.json" \
            --cache-control "no-cache"

      # --- Upload schema fingerprints (generated by fingerprints job) ---
      - name: Download fingerprints
        uses: actions/download-artifact@v4
        with:
          name: schema-fingerprints

      - name: Upload fingerprints to S3
        env:
          S3_BUCKET: ${{ vars.TF_VAR_S3_BUCKET_NAME }}
        run: |
          aws s3 cp schema-fingerprints.json "s3://$S3_BUCKET/schema-fingerprints.json" \
            --cache-control "no-cache"

      # --- Build index page ---
      - name: Ensure data files exist
        env:
          S3_BUCKET: ${{ vars.TF_VAR_S3_BUCKET_NAME }}
        run: |
          [ -f versions.json ] || aws s3 cp "s3://$S3_BUCKET/versions.json" versions.json 2>/dev/null || echo '[]' > versions.json
          [ -f schema-fingerprints.json ] || aws s3 cp "s3://$S3_BUCKET/schema-fingerprints.json" schema-fingerprints.json 2>/dev/null || echo '{}' > schema-fingerprints.json

      - name: Build index page
        run: bun run build

      - name: Upload index page
        env:
          S3_BUCKET: ${{ vars.TF_VAR_S3_BUCKET_NAME }}
        run: |
          aws s3 sync dist/_astro/ "s3://$S3_BUCKET/_astro/" \
            --cache-control "public, max-age=31536000, immutable"

          aws s3 cp dist/index.html "s3://$S3_BUCKET/index.html" \
            --cache-control "public, max-age=300"

      - name: Invalidate CloudFront
        if: vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" "/_astro/*"
